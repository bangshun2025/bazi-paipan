// 提取 paipan 结果中的关键数据，用于存储
function extractBaziFromPaipan(p) {
  return {
    bazi: {
      nian: { gan: p.nian.gan, zhi: p.nian.zhi },
      yue:  { gan: p.yue.gan, zhi: p.yue.zhi },
      ri:   { gan: p.ri.gan, zhi: p.ri.zhi },
      shi:  { gan: p.shi.gan, zhi: p.shi.zhi }
    },
    sanyuan: {
      tai:  { gan: p.tai.gan, zhi: p.tai.zhi },
      ming: { gan: p.ming.gan, zhi: p.ming.zhi },
      shen: { gan: p.shen.gan, zhi: p.shen.zhi }
    },
    extras: {
      shengXiao: p.shengXiao,
      qiYun: { year: p.qiYun.years, month: p.qiYun.months, day: p.qiYun.days, hour: p.qiYun.hours, shun: p.qiYun.shun },
      daYun: p.daYun.map(function(dy) { return { gan: dy.gan, zhi: dy.zhi, startAge: dy.startAge, endAge: dy.endAge, startYear: dy.startYear }; })
    },
    gongWeiType: null
  };
}

// 从档案数据构建 renderChart 所需的完整 paipan 数据对象
function buildChartDataFromArchive(arch) {
  // 若 bazi 为空，先计算
  if (!arch.bazi) {
    var p = paipan(arch.name, arch.gender, arch.year, arch.month, arch.day, arch.hour, arch.min || 0);
    arch.bazi = {
      nian: { gan: p.nian.gan, zhi: p.nian.zhi },
      yue:  { gan: p.yue.gan, zhi: p.yue.zhi },
      ri:   { gan: p.ri.gan, zhi: p.ri.zhi },
      shi:  { gan: p.shi.gan, zhi: p.shi.zhi }
    };
    arch.sanyuan = {
      tai:  { gan: p.tai.gan, zhi: p.tai.zhi },
      ming: { gan: p.ming.gan, zhi: p.ming.zhi },
      shen: { gan: p.shen.gan, zhi: p.shen.zhi }
    };
    arch.extras = {
      shengXiao: p.shengXiao,
      qiYun: { year: p.qiYun.years, month: p.qiYun.months, day: p.qiYun.days, hour: p.qiYun.hours, shun: p.qiYun.shun },
      daYun: p.daYun.map(function(dy) { return { gan: dy.gan, zhi: dy.zhi, startAge: dy.startAge, endAge: dy.endAge, startYear: dy.startYear }; })
    };
    // Save back to localStorage
    saveArchives(getArchives());
  }
  // Rebuild paipan-style data object
  var p = paipan(arch.name, arch.gender, arch.year, arch.month, arch.day, arch.hour, arch.min || 0);
  // Ensure bazi fields match (paipan recalculates, but we want consistent results)
  p.nian.gan = arch.bazi.nian.gan; p.nian.zhi = arch.bazi.nian.zhi;
  p.yue.gan = arch.bazi.yue.gan; p.yue.zhi = arch.bazi.yue.zhi;
  p.ri.gan = arch.bazi.ri.gan; p.ri.zhi = arch.bazi.ri.zhi;
  p.shi.gan = arch.bazi.shi.gan; p.shi.zhi = arch.bazi.shi.zhi;
  p.tai.gan = arch.sanyuan.tai.gan; p.tai.zhi = arch.sanyuan.tai.zhi;
  p.ming.gan = arch.sanyuan.ming.gan; p.ming.zhi = arch.sanyuan.ming.zhi;
  p.shen.gan = arch.sanyuan.shen.gan; p.shen.zhi = arch.sanyuan.shen.zhi;
  return p;
}

// 在卡片展开区渲染排盘（复用 renderChart，输出到临时容器）
function renderExpandedChart(arch, containerEl) {
  var data = buildChartDataFromArchive(arch);
  // Create a temporary div, render into it, then move to container
  var tmpId = 'archive-expanded-tmp';
  var existingTmp = document.getElementById(tmpId);
  if (existingTmp) existingTmp.parentNode.removeChild(existingTmp);
  var tmp = document.createElement('div');
  tmp.id = tmpId;
  tmp.style.display = 'none';
  document.body.appendChild(tmp);
  // Temporarily set output to tmp
  var origOutput = document.getElementById('output');
  tmp.innerHTML = '<div id="output"></div>';
  // Re-render: simplified approach — build HTML directly
  try {
    var html = renderChartToHtml(data, arch);
    containerEl.innerHTML = html;
  } catch(e) {
    containerEl.innerHTML = '<div style="color:var(--c-red);padding:10px;">排盘渲染出错: ' + e.message + '</div>';
  }
  if (tmp.parentNode) tmp.parentNode.removeChild(tmp);
}

// 生成只读排盘HTML（精简版，四柱+三垣）
function renderChartToHtml(data, arch) {
  var riGan = data.ri.gan, riZhi = data.ri.zhi;
  function pillar(gan, zhi) {
    return {
      gan: gan, zhi: zhi,
      wg: wxClass(gan), wz: wxClass(zhi),
      rs: shiShen(riGan, gan),
      ny: NAYIN[gan + zhi] || '',
      xy: changSheng(riGan, zhi),
      zz: changSheng(gan, zhi),
      kw: gan + zhi === riGan + riZhi ? kongWang(riGan, riZhi) : kongWang(gan, zhi),
      cg: cangGanText(zhi, riGan, 1),
      sh: gan + zhi === riGan + riZhi ? shenSha(riGan, riZhi, data.nian.zhi, data.yue.zhi) : ''
    };
  }
  var pNian = pillar(data.nian.gan, data.nian.zhi);
  var pYue = pillar(data.yue.gan, data.yue.zhi);
  var pRi = pillar(data.ri.gan, data.ri.zhi);
  var pShi = pillar(data.shi.gan, data.shi.zhi);
  var pTai = pillar(data.tai.gan, data.tai.zhi);
  var pMing = pillar(data.ming.gan, data.ming.zhi);
  var pShen = pillar(data.shen.gan, data.shen.zhi);

  function td(cls, txt) { return '<td class="' + (cls||'') + '">' + (txt||'') + '</td>'; }
  function rl(lbl) { return '<td class="rl">' + lbl + '</td>'; }
  function emp() { return '<td></td>'; }
  function th(cls, txt) { return '<th class="' + (cls||'') + '">' + txt + '</th>'; }

  var rows = [];
  // Header
  rows.push('<tr class="hd">' + rl('') + th('','年柱') + th('','月柱') + th('','日柱') + th('','时柱') + emp() + th('','胎元') + th('','命宫') + th('','身宫') + '</tr>');
  // 主星
  rows.push('<tr class="rs">' + rl('主星') + td('',pNian.rs) + td('',pYue.rs) + td('',pRi.rs) + td('',pShi.rs) + emp() + td('',pTai.rs) + td('',pMing.rs) + td('',pShen.rs) + '</tr>');
  // 天干
  rows.push('<tr class="rg">' + rl('') + td(pNian.wg,pNian.gan) + td(pYue.wg,pYue.gan) + td(pRi.wg,pRi.gan) + td(pShi.wg,pShi.gan) + emp() + td(pTai.wg,pTai.gan) + td(pMing.wg,pMing.gan) + td(pShen.wg,pShen.gan) + '</tr>');
  // 地支
  rows.push('<tr class="rg">' + rl('') + td(pNian.wz,pNian.zhi) + td(pYue.wz,pYue.zhi) + td(pRi.wz,pRi.zhi) + td(pShi.wz,pShi.zhi) + emp() + td(pTai.wz,pTai.zhi) + td(pMing.wz,pMing.zhi) + td(pShen.wz,pShen.zhi) + '</tr>');
  // 藏气
  rows.push('<tr class="rh">' + rl('藏气') + td('',pNian.cg) + td('',pYue.cg) + td('',pRi.cg) + td('',pShi.cg) + emp() + td('',pTai.cg) + td('',pMing.cg) + td('',pShen.cg) + '</tr>');
  // 纳音

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function openArchivePanel() {
  renderArchiveModal();
  document.getElementById('archiveOverlay').classList.add('show');
  document.getElementById('archive-search-modal').value = '';
  setTimeout(function() { document.getElementById('archive-search-modal').focus(); }, 100);
}

function closeArchivePanel() {
  document.getElementById('archiveOverlay').classList.remove('show');
}

function renderArchiveModal() {
  var listEl = document.getElementById('archive-modal-list');
  var archives = getArchives();
  if (!listEl) return;

  if (archives.length === 0) {
    listEl.innerHTML = '<div class="archive-modal-empty">暂无档案，排盘后自动保存</div>';
    return;
  }

  // Sort by updatedAt desc
  archives.sort(function(a, b) {
    return (b.updatedAt || '').localeCompare(a.updatedAt || '');
  });
  saveArchives(archives);

  var html = '';
  for (var i = 0; i < archives.length; i++) {
    var a = archives[i];
    var genderIcon = a.gender === '男' ? '♂' : '♀';
    var genderCls = a.gender === '男' ? 'male' : 'female';
    var displayName = (a.nickname || '') ? (a.nickname + ' / ' + a.name) : a.name;
    var dateStr = a.year + '年' + a.month + '月' + a.day + '日 ' + pad(a.hour) + ':' + pad(a.min || 0);
    html += '<div class="archive-modal-row">'
      + '<div class="archive-row-info">'
      + '<span class="archive-row-name">' + escHtml(displayName) + '</span>'
      + '<span class="archive-row-gender ' + genderCls + '">' + genderIcon + '</span>'
      + '<span class="archive-row-date">' + escHtml(dateStr) + '</span>'
      + '</div>'
      + '<button class="archive-row-btn" onclick="loadFromArchive(' + i + ')">排盘</button>'
      + '</div>';
  }
  listEl.innerHTML = html;
}

// P1：搜索防抖 150ms，减少输入过程中的中间态渲染
var _filterTimer = null;
function onArchiveSearch(val) {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(function() { filterArchives(val); }, 150);
}

function filterArchives(keyword) {
  var k = (keyword || '').trim().toLowerCase();
  var archives = getArchives();
  var listEl = document.getElementById('archive-modal-list');
  if (!listEl) return;

  if (!k) {
    renderArchiveModal();
    return;
  }

  var filtered = [];
  for (var i = 0; i < archives.length; i++) {
    var a = archives[i];
    var match = (a.nickname || '').toLowerCase().indexOf(k) >= 0
      || (a.name || '').toLowerCase().indexOf(k) >= 0;
    if (match) filtered.push({arch: a, idx: i});
  }

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="archive-modal-empty">未找到匹配档案</div>';
    return;
  }

  var html = '';
  for (var j = 0; j < filtered.length; j++) {
    var a = filtered[j].arch;
    var idx = filtered[j].idx;
    var genderIcon = a.gender === '男' ? '♂' : '♀';
    var genderCls = a.gender === '男' ? 'male' : 'female';
    var displayName = (a.nickname || '') ? (a.nickname + ' / ' + a.name) : a.name;
    var dateStr = a.year + '年' + a.month + '月' + a.day + '日 ' + pad(a.hour) + ':' + pad(a.min || 0);
    html += '<div class="archive-modal-row">'
      + '<div class="archive-row-info">'
      + '<span class="archive-row-name">' + escHtml(displayName) + '</span>'
      + '<span class="archive-row-gender ' + genderCls + '">' + genderIcon + '</span>'
      + '<span class="archive-row-date">' + escHtml(dateStr) + '</span>'
      + '</div>'
      + '<button class="archive-row-btn" onclick="loadFromArchive(' + idx + ')">排盘</button>'
      + '</div>';
  }
  listEl.innerHTML = html;
}

function loadFromArchive(idx) {
  var archives = getArchives();
  if (!archives[idx]) return;
  setFormData(archives[idx]);
  closeArchivePanel();
  doPaipan();
  // Scroll to top to see form
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 时间修饰词→小时偏移
const TIME_MOD = {
  '凌晨':0, '半夜':0, '早晨':0, '早上':0, '上午':0,
  '中午':12, '下午':12, '傍晚':12, '黄昏':12, '晚上':12, '夜里':12
};

function parseNaturalInput(text) {
  const result = { name:'', gender:'男', year:null, month:null, day:null, hour:null, min:0, prov:'', city:'', dist:'' };
  let t = text.trim();
  if (!t) return result;

  // 1. 提取性别
  const genderM = t.match(/[男女]/);
  if (genderM) { result.gender = genderM[0]; t = t.replace(genderM[0], ' '); }

  // 2. 提取日期 — 中文格式
  const dateCN = t.match(/(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*[日号]/);
  if (dateCN) {
    result.year = parseInt(dateCN[1]);
    result.month = parseInt(dateCN[2]);
    result.day = parseInt(dateCN[3]);
    t = t.replace(dateCN[0], ' ');
  }
  // 数字格式 1982-10-18 / 1982.10.18 / 1982/10/18
  if (!result.year) {
    const dateNum = t.match(/(\d{4})\s*[-./]\s*(\d{1,2})\s*[-./]\s*(\d{1,2})/);
    if (dateNum) {
      result.year = parseInt(dateNum[1]);
      result.month = parseInt(dateNum[2]);
      result.day = parseInt(dateNum[3]);
      t = t.replace(dateNum[0], ' ');
    }
  }

  // 3. 提取时间
  // 先匹配带修饰词的：早上5点、下午3点、晚上8点01分
  const timeMod = t.match(/(凌晨|半夜|早晨|早上|上午|中午|下午|傍晚|黄昏|晚上|夜里)\s*(\d{1,2})\s*[点时:：]\s*(\d{1,2})?\s*[分]?/);
  if (timeMod) {
    let h = parseInt(timeMod[2]);
    const m = timeMod[3] ? parseInt(timeMod[3]) : 0;
    const mod = TIME_MOD[timeMod[1]];
    if (mod === 12) {
      if (h < 12) h += 12;
      if (h === 12 && timeMod[1] === '中午') h = 12;
    }
    result.hour = h;
    result.min = m;
    t = t.replace(timeMod[0], ' ');
  }
  // 纯数字时间 5:01 / 05:01 / 5时01分
  if (result.hour === null) {
    const timeNum = t.match(/(\d{1,2})\s*[:：时点]\s*(\d{1,2})?\s*[分]?/);
    if (timeNum) {
      result.hour = parseInt(timeNum[1]);
      result.min = timeNum[2] ? parseInt(timeNum[2]) : 0;
      t = t.replace(timeNum[0], ' ');
    }
  }
  // 只有小时：5点
  if (result.hour === null) {
    const hourOnly = t.match(/(\d{1,2})\s*点/);
    if (hourOnly) {
      result.hour = parseInt(hourOnly[1]);
      result.min = 0;
      t = t.replace(hourOnly[0], ' ');
    }
  }

  // 4. 提取地址
  const provList = Object.keys(LOC_DATA);
  // 按长度降序匹配，防止"广西"匹配到"广西省"
  const sortedProv = [...provList].sort((a,b) => b.length - a.length);
  for (const p of sortedProv) {
    if (t.includes(p)) {
      result.prov = p;
      t = t.replace(p, ' ');
      // 提取城市
      const cities = Object.keys(LOC_DATA[p].cities);
      const sortedCities = [...cities].sort((a,b) => b.length - a.length);
      for (const c of sortedCities) {
        const shortC = c.replace(/[市县区]$/, '');
        if (t.includes(c) || t.includes(shortC)) {
          result.city = c;
          t = t.replace(c, ' ').replace(shortC, ' ');
          // 提取区县
          const dists = LOC_DATA[p].cities[c]?.dist || [];
          for (const d of dists) {
            if (t.includes(d)) { result.dist = d; t = t.replace(d, ' '); break; }
          }
          break;
        }
      }
      break;
    }
  }

  // 5. 提取姓名 — 剩余文本中取2-4个连续汉字
  const nameM = t.match(/[\u4e00-\u9fa5]{2,4}/);
  if (nameM) result.name = nameM[0];

  return result;
}

function doAiParse() {
  const text = document.getElementById('aiInput').value.trim();
  if (!text) return;
  const r = parseNaturalInput(text);
  
  // 构建预览
  let preview = '';
  if (r.name) preview += '姓名：' + r.name + '  ';
  preview += '性别：' + r.gender + '  ';
  if (r.year) preview += r.year + '年' + r.month + '月' + r.day + '日  ';
  if (r.hour !== null) preview += r.hour + ':' + String(r.min).padStart(2,'0') + '  ';
  if (r.prov) preview += r.prov + (r.city||'') + (r.dist||'');
  
  if (!r.year) {
    document.getElementById('aiPreview').textContent = '⚠ 未能识别完整日期，请补充';
    return;
  }

  document.getElementById('aiPreview').textContent = '✅ 识别：' + preview;

  // 填表
  if (r.name) document.getElementById('inName').value = r.name;
  document.getElementById('inGender').value = r.gender;
  document.getElementById('inYear').value = r.year;
  document.getElementById('inMonth').value = r.month;
  document.getElementById('inDay').value = r.day;
  if (r.hour !== null) document.getElementById('inHour').value = r.hour;
  document.getElementById('inMin').value = r.min;
  
  // 地址
  if (r.prov) {
    document.getElementById('useSolar').checked = true;
    toggleSolar();
    document.getElementById('inProv').value = r.prov;
    onProvChange();
    setTimeout(() => {
      if (r.city) { document.getElementById('inCity').value = r.city; onCityChange(); }
      setTimeout(() => {
        if (r.dist) document.getElementById('inDist').value = r.dist;
        hideAiInput();
        doPaipan();
      }, 100);
    }, 100);
  } else {
    document.getElementById('useSolar').checked = false;
    toggleSolar();
    hideAiInput();
    doPaipan();
  }
}

      { label:'小龙', yg:'癸', yz:'酉', sz:'戌', ng:'己', mg:'甲戌', sg:'壬申', ty:'甲子' },
      { label:'苓菲', yg:'壬', yz:'子', sz:'子', ng:'壬', mg:'乙巳', sg:'癸丑', ty:'癸卯' },
      { label:'新善', yg:'丁', yz:'酉', sz:'辰', ng:'辛', mg:'壬辰', sg:'庚寅', ty:'戊子' },
      { label:'冯际州', yg:'己', yz:'亥', sz:'丑', ng:'丙', mg:'癸巳', sg:'辛丑', ty:'庚寅' },
      { label:'吴星宝', yg:'乙', yz:'巳', sz:'酉', ng:'丁', mg:'癸卯', sg:'癸卯', ty:'丙申' },
      { label:'邵凡语', yg:'丁', yz:'未', sz:'寅', ng:'丁', mg:'戊申', sg:'庚戌', ty:'戊戌' },
    ];
    for (const c of cases) {
      const ty = taiYuan(c.yg, c.yz); tests.push(eq('胎元:'+c.label, ty.gan+ty.zhi, c.ty));
      const mg = mingGong(c.yz, c.sz, c.ng); tests.push(eq('命宫:'+c.label, mg.gan+mg.zhi, c.mg));
      const sg = shenGong(c.yz, c.sz, c.ng); tests.push(eq('身宫:'+c.label, sg.gan+sg.zhi, c.sg));
    }
  })();

  // 渲染结果
  const results = document.getElementById('test-results');
  const summary = document.getElementById('test-summary');
  let html = '', passed = 0, failed = 0;

  for (const t of tests) {
    if (t.section) { html += '<div style="color:#ff9800;font-size:13px;margin:16px 0 8px;text-transform:uppercase;letter-spacing:1px">' + t.section + '</div>'; continue; }
    if (t.ok) {
      passed++;
      html += '<div style="margin-bottom:6px;padding:8px 12px;border-radius:4px;font-size:14px;font-family:monospace;background:#1b3a1b;border-left:3px solid #4caf50"><span style="font-weight:bold;margin-right:8px">✅</span>' + t.label + (t.detail ? ' <span style="color:#aaa;font-size:12px">' + t.detail + '</span>' : '') + '</div>';
    } else {
      failed++;
      html += '<div style="margin-bottom:6px;padding:8px 12px;border-radius:4px;font-size:14px;font-family:monospace;background:#3a1b1b;border-left:3px solid #f44336"><span style="font-weight:bold;margin-right:8px">❌</span>' + t.label + ' <span style="color:#f99;font-size:12px">' + t.detail + '</span></div>';
    }
  }

  const elapsed = Date.now() - start;
  const total = passed + failed;
  summary.innerHTML = total + ' 条断言，<span style="color:' + (failed===0?'#4caf50':'#f44336') + ';font-weight:bold">'
    + passed + ' 通过</span>'
    + (failed>0 ? '，<span style="color:#f44336;font-weight:bold">' + failed + ' 失败</span>' : '')
    + ' · ' + elapsed + 'ms';
  results.innerHTML = html;
  document.getElementById('test-time').textContent = new Date().toLocaleString();

  if (failed === 0) {
    document.title = '✅ 全部通过 — 八字排盘回归测试';
  } else {
    document.title = '❌ ' + failed + ' 失败 — 八字排盘回归测试';
  }
})();
</script>

</body>
</html>
